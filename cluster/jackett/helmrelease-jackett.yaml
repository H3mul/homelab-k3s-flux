apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jackett
  namespace: jackett
spec:
  chart:
    spec:
      chart: app-template
      version: 1.5.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: jackett
  values:
    image:
      repository: linuxserver/jackett
      tag: 0.24.2205@sha256:cfb83d8fbb9942bcddc3024be1576030f45f7b229800f661221c598370d5800d

    env:
      TZ: "${TIMEZONE}"
      AUTO_UPDATE: "false"

    service:
      main:
        ports:
          http:
            port: 9117

    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        annotations:
          uptime-kuma.autodiscovery.probe.accepted-statuscodes: '["400-499"]'
          nginx.ingress.kubernetes.io/configuration-snippet: |
            proxy_hide_header "x-webkit-csp";
            proxy_hide_header "content-security-policy";
            proxy_hide_header "X-Frame-Options";
            proxy_set_header Accept-Encoding "";
            sub_filter '</head>' '<link rel="stylesheet" type="text/css" href="https://theme-park.${CLUSTER_DOMAIN}/css/base/jackett/nord.css"></head>';
            sub_filter_once on;
        hosts:
        - host: &host "jackett.${CLUSTER_DOMAIN}"
          paths:
          - path: /
            pathType: Prefix
        tls:
        - secretName: letsencrypt-wildcard-cert-prod
          hosts:
          - *host

    persistence:
      config:
        enabled: true
        mountPath: /config
        existingClaim: jackett-config
