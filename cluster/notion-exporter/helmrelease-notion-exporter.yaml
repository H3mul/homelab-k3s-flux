# This CronJob pulls the notion export into a PVC so that volsync can then back it up via restic

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app notion-exporter
  namespace: notion-exporter
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: notion-exporter
  values:
    controllers:
      *app :
        type: cronjob
        cronjob:
          schedule: "0 0 * * 0" # Every 5 minutes
        initContainers:
          clear-data:
            image: 
              repository: busybox
              tag: 1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
            command: ['sh', '-c', 'rm -rf /data/*']
        containers:
          *app :
            image:
              repository: ghcr.io/h3mul/notion-exporter
              tag: 0.8.1@sha256:76161dce87051b3c3d320cff6840bdee19cbfb901ee8e80b2c7423ccbeebad01
              pullPolicy: Always
            env:
              TZ: ${TIMEZONE}
              OUTPUT_DIR: /data
            envFrom:
              - secretRef:
                  name: notion-credentials

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        size: 5Gi
        globalMounts:
          - path: /data
        accessMode: ReadWriteOnce
        storageClass: truenas-ssd-iscsi
