# This CronJob pulls the notion export into a PVC so that volsync can then back it up via restic

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app notion-exporter
  namespace: notion-exporter
spec:
  chart:
    spec:
      chart: app-template
      version: 4.4.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: notion-exporter
  values:
    controllers:
      *app :
        type: cronjob
        cronjob:
          schedule: "0 0 * * 0" # Every 5 minutes
        initContainers:
          clear-data:
            image: 
              repository: busybox
              tag: 1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
            command: ['sh', '-c', 'rm -rf /data/*']
        containers:
          *app :
            image:
              repository: ghcr.io/h3mul/notion-exporter
              tag: 0.8.1@sha256:88944dbf063cbfe423987c668627a712d4b138e2425cbfb7ae33acefc568a35b
              pullPolicy: IfNotPresent
            env:
              TZ: ${TIMEZONE}
              OUTPUT_DIR: /data
            envFrom:
              - secretRef:
                  name: notion-credentials

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        size: 5Gi
        globalMounts:
          - path: /data
        accessMode: ReadWriteOnce
        storageClass: truenas-ssd-iscsi
