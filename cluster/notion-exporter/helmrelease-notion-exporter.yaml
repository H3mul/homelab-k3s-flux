# This CronJob pulls the notion export into a PVC so that volsync can then back it up via restic

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app notion-exporter
  namespace: notion-exporter
spec:
  chart:
    spec:
      chart: app-template
      version: 4.4.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: notion-exporter
  values:
    controllers:
      *app :
        type: cronjob
        cronjob:
          schedule: "0 0 * * 0" # Every 5 minutes
        initContainers:
          clear-data:
            image: 
              repository: busybox
              tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
            command: ['sh', '-c', 'rm -rf /data/*']
        containers:
          *app :
            image:
              repository: ghcr.io/h3mul/notion-exporter
              tag: 0.8.1@sha256:fd0285e32a1ec3417fd86837bbc745cbbdbe7bd75b6991c68ac6847713e6cf34
              pullPolicy: IfNotPresent
            env:
              TZ: ${TIMEZONE}
              OUTPUT_DIR: /data
            envFrom:
              - secretRef:
                  name: notion-credentials

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        size: 5Gi
        globalMounts:
          - path: /data
        accessMode: ReadWriteOnce
        storageClass: truenas-ssd-iscsi
