apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: b2-seerr-config
  namespace: media
spec:
  sourcePVC: seerr
  trigger:
    schedule: 12 0 * * 0
  restic:
    repository: b2-seerr-config-restic

    copyMethod: Snapshot
    volumeSnapshotClassName: truenas-ssd-iscsi
    storageClassName: truenas-ssd-iscsi

    pruneIntervalDays: 10
    cacheCapacity: 1Gi
    retain:
      daily: 7
      weekly: 4
      monthly: 6
      within: 3d

    moverSecurityContext:
      runAsUser: ${FILESHARE_USER_ID}
      runAsGroup: ${FILESHARE_GROUP_ID}
      fsGroup: ${FILESHARE_GROUP_ID}
