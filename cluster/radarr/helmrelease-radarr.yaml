apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: radarr
  values:
    controllers:
      radarr:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.2.1
            env:
              RADARR__INSTANCE_NAME: Radarr
              RADARR__PORT: &port 7878
              RADARR__LOG_LEVEL: info
              RADARR__API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: radarr-api-key
                    key: api_key
        pod:
          securityContext:
            runAsUser: ${FILESHARE_USER_ID}
            runAsGroup: ${FILESHARE_GROUP_ID}
            fsGroup: ${FILESHARE_GROUP_ID}
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups:
              - 65539
              
    service:
      app:
        controller: radarr
        ports:
          http:
            port: *port

    ingress:
      app:
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/configuration-snippet: |
            proxy_hide_header "x-webkit-csp";
            proxy_hide_header "content-security-policy";
            proxy_hide_header "X-Frame-Options";
            proxy_set_header Accept-Encoding "";
            sub_filter '</head>' '<link rel="stylesheet" type="text/css" href="https://theme-park.${CLUSTER_DOMAIN}/css/base/radarr/nord.css"></head>';
            sub_filter_once on;
        hosts:
          - host: &host radarr.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: letsencrypt-wildcard-cert-prod
            hosts:
              - *host

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        size: 5Gi
        storageClass: truenas-ssd-iscsi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /config

      media:
        existingClaim: qbittorrent-download
        globalMounts:
          - path: /downloads
