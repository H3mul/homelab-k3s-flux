---
endpointRoutes:
  enabled: true
hubble:
  enabled: false
ipam:
  mode: kubernetes
ipv4NativeRoutingCIDR: 10.244.0.0/16
routingMode: native
autoDirectNodeRoutes: true
k8sServiceHost: homelab.hemul.net
k8sServicePort: 6443
kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
bpf:
  # datapathMode: netkit
  masquerade: false
  preallocateMaps: false
  # Cilium 1.19 recommended BPF settings for BGP/DSR
  lbExternalClusterIP: true
  # tproxy: true
# In 1.19+, BPF LB with BGP can sometimes require adjusting the mode
  # especially if DSR is used and nodes lose connectivity.
bpfClockProbe: true
cgroup:
  automount:
    enabled: false
  hostRoot: /sys/fs/cgroup
envoy:
  enabled: false
devices:
  - eno1
l2announcements:
  enabled: true
# l7Proxy: true
bgpControlPlane:
  enabled: true
# In Cilium 1.19, the BGP Control Plane (GoBGP-based) is being phased out 
# in favor of the new BGP speaker if specific connectivity issues arise.
# However, keeping it enabled while ensuring the securityContext is correct.
externalIPs:
  enabled: true
loadBalancer:
  acceleration: best-effort
  algorithm: maglev
  mode: dsr
localRedirectPolicies:
  enabled: true
operator:
  rollOutPods: true
rollOutCiliumPods: true
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - PERFMON
      - BPF
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
